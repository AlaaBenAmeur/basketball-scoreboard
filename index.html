<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link href="https://fonts.cdnfonts.com/css/seven-segment" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <div class="teams">
                <div class="team-section">
                    <h3>A TEAM</h3>
                    <div class="points" id="home-points"></div>
                    <div class="add-btns">
                        <button class="add-btn" onclick="add1Home()">+1</button>
                        <button class="add-btn" onclick="add2Home()">+2</button>
                        <button class="add-btn" onclick="add3Home()">+3</button>
                    </div>
                </div>
                <div class="team-section">
                    <h3>ANOTHER TEAM</h3>
                    <div class="points" id="guest-points"></div>
                    <div class="add-btns">
                        <button class="add-btn" onclick="add1Guest()">+1</button>
                        <button class="add-btn" onclick="add2Guest()">+2</button>
                        <button class="add-btn" onclick="add3Guest()">+3</button>
                    </div>
                </div>
            </div>
            
            <div class="options">
                <button class="new-game-btn" onclick="reset()">Start New Game</button> 
                
                <button class="leader-btn" onclick="getLeader()">Update Leader</button>
                
            </div>

            <div id="notification-bar">
            </div>

        </div>
        <script src="index.js"></script>
    </body>
</html>
